name: Bootstrap M0

on:
  push:
    branches:
      - feat/m0-foundation
    paths:
      - bootstrap/READY
  pull_request:
    branches:
      - main
    paths:
      - bootstrap/READY
      - bootstrap/part-*
      - .github/workflows/bootstrap-m0.yml

permissions:
  contents: write

concurrency:
  group: bootstrap-m0-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Generate, verify and commit M0
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/m0-foundation
          fetch-depth: 0

      - name: Determine bootstrap state
        id: state
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract project files
        if: steps.state.outputs.needed == 'true'
        run: |
          cat bootstrap/part-* | base64 --decode > /tmp/m0-project.tar.gz
          echo "1dce8c8b207d69ee6649445f2c5b1fa112686fb6cbc81908508b20eaab527ab1  /tmp/m0-project.tar.gz" | sha256sum --check
          tar -xzf /tmp/m0-project.tar.gz -C .
          sed -i 's/new Phaser\.Geom\.Point/new Phaser.Math.Vector2/g' src/game/scenes/FoundationScene.ts
          rm -rf bootstrap diagnostics
          rm -f .github/workflows/quality.yml

      - name: Setup Node.js
        if: steps.state.outputs.needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and create lockfile
        if: steps.state.outputs.needed == 'true'
        run: npm install --no-audit --no-fund

      - name: Verify M0
        id: verify
        if: steps.state.outputs.needed == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee /tmp/m0-verify.log

      - name: Store verification diagnostics
        if: steps.state.outputs.needed == 'true' && steps.verify.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          mkdir -p diagnostics
          cp /tmp/m0-verify.log diagnostics/m0-verify.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/m0-verify.log
          git commit -m "chore: capture M0 verification failure"
          git push origin HEAD:feat/m0-foundation
          exit 1

      - name: Commit verified project
        if: steps.state.outputs.needed == 'true' && steps.verify.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement M0 game foundation"
          git push origin HEAD:feat/m0-foundation
