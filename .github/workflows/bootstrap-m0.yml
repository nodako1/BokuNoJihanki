name: Bootstrap M0

on:
  push:
    branches:
      - feat/m0-foundation
    paths:
      - bootstrap/m0-project.tar.gz.b64

permissions:
  contents: write

concurrency:
  group: bootstrap-m0-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Generate, verify and commit M0
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/m0-foundation
          fetch-depth: 0

      - name: Extract project files
        run: |
          base64 --decode bootstrap/m0-project.tar.gz.b64 > /tmp/m0-project.tar.gz
          tar -xzf /tmp/m0-project.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap-m0.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and create lockfile
        run: npm install --no-audit --no-fund

      - name: Verify M0
        run: npm run check

      - name: Commit verified project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement M0 game foundation"
          git push origin HEAD:feat/m0-foundation
