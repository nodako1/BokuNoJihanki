name: M1.1 Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/m11-diagnostic.yml'
      - 'src/**'
      - 'scripts/**'
      - 'public/assets/images/m1/asset-manifest.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Capture validation output
        shell: bash
        run: |
          mkdir -p diagnostics/m11
          set +e
          npm run validate > diagnostics/m11/validate.log 2>&1
          echo $? > diagnostics/m11/validate.exit
          npm run lint > diagnostics/m11/lint.log 2>&1
          echo $? > diagnostics/m11/lint.exit
          npm run typecheck > diagnostics/m11/typecheck.log 2>&1
          echo $? > diagnostics/m11/typecheck.exit
          npm test > diagnostics/m11/test.log 2>&1
          echo $? > diagnostics/m11/test.exit
          npm run build > diagnostics/m11/build.log 2>&1
          echo $? > diagnostics/m11/build.exit
          cat diagnostics/m11/*.log
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m11-diagnostic-${{ github.sha }}
          path: diagnostics/m11
          if-no-files-found: error
          retention-days: 2
