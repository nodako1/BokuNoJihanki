name: Report M1.2 Workflow Status
# refresh: final-apply-failure

on:
  push:
    branches:
      - ci/m12-status-monitor
    paths:
      - '.github/workflows/m12-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query failure details
        shell: bash
        run: |
          gh run view 29964397348 --repo nodako1/BokuNoJihanki --log-failed > /tmp/failed.log || true
          tail -n 100 /tmp/failed.log > /tmp/tail.log
          {
            echo '## M1.2 final apply failure details'
            echo
            echo '```text'
            cat /tmp/tail.log
            echo '```'
          } > /tmp/comment.md
          gh api --method PATCH repos/nodako1/BokuNoJihanki/issues/comments/5052404384 \
            -f body="$(cat /tmp/comment.md)"
