name: Report M1.2 Workflow Status
# refresh: final-apply

on:
  push:
    branches:
      - ci/m12-status-monitor
    paths:
      - '.github/workflows/m12-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query M1.2 workflow runs
        shell: bash
        run: |
          gh run list --repo nodako1/BokuNoJihanki \
            --branch feat/m1-2-painterly-raster \
            --limit 12 \
            --json databaseId,name,event,status,conclusion,headSha,createdAt,updatedAt,url \
            > /tmp/feature-runs.json
          gh run list --repo nodako1/BokuNoJihanki \
            --branch ci/m12-apply-final \
            --limit 5 \
            --json databaseId,name,event,status,conclusion,headSha,createdAt,updatedAt,url \
            > /tmp/apply-runs.json

          python - <<'PY'
          import json
          from pathlib import Path

          runs = json.loads(Path('/tmp/apply-runs.json').read_text()) + json.loads(Path('/tmp/feature-runs.json').read_text())
          runs.sort(key=lambda run: run['updatedAt'], reverse=True)
          lines = [
              '## M1.2 latest workflow status',
              '',
              '| Run | Workflow | Branch event | Status | Conclusion | Head | Updated |',
              '|---:|---|---|---|---|---|---|',
          ]
          for run in runs[:15]:
              lines.append(
                  f"| [{run['databaseId']}]({run['url']}) | {run['name']} | {run['event']} | "
                  f"{run['status']} | {run.get('conclusion') or '—'} | "
                  f"`{run['headSha'][:7]}` | {run['updatedAt']} |"
              )
          Path('/tmp/comment.md').write_text('\n'.join(lines) + '\n')
          PY

          gh api --method PATCH repos/nodako1/BokuNoJihanki/issues/comments/5052404384 \
            -f body="$(cat /tmp/comment.md)"
