name: Report M1.2 Workflow Status
# refresh: 2026-07-23T00:00:00Z

on:
  push:
    branches:
      - ci/m12-status-monitor
    paths:
      - '.github/workflows/m12-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query recent feature-branch workflow runs
        shell: bash
        run: |
          gh run list --repo nodako1/BokuNoJihanki \
            --branch feat/m1-2-painterly-raster \
            --limit 30 \
            --json databaseId,name,event,status,conclusion,headSha,createdAt,updatedAt,url \
            > /tmp/runs.json

          python - <<'PY'
          import json
          from pathlib import Path

          runs = json.loads(Path('/tmp/runs.json').read_text())
          lines = [
              '## M1.2 workflow status report',
              '',
              '| Run | Workflow | Event | Status | Conclusion | Head | Updated |',
              '|---:|---|---|---|---|---|---|',
          ]
          for run in runs:
              lines.append(
                  f"| [{run['databaseId']}]({run['url']}) | {run['name']} | {run['event']} | "
                  f"{run['status']} | {run.get('conclusion') or '—'} | "
                  f"`{run['headSha'][:7]}` | {run['updatedAt']} |"
              )
          Path('/tmp/comment.md').write_text('\n'.join(lines) + '\n')
          PY

          gh pr comment 16 --repo nodako1/BokuNoJihanki --body-file /tmp/comment.md
