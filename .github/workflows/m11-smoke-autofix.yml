name: M1.1 Browser Smoke Autofix

on:
  push:
    branches:
      - feat/m1-1-visual-complete
    paths:
      - '.github/workflows/m11-smoke-autofix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/m1-1-visual-complete
          fetch-depth: 0
      - name: Patch browser smoke for clean visual evidence and low-FPS traversal
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/browser-smoke.mjs')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    viewport: { width: 1600, height: 900 },',
              '    viewport: { width: 1280, height: 720 },',
          )
          text = text.replace(
              "  await page.screenshot({ path: path.join(outputDir, '02-morning-residential.png'), fullPage: true });\n\n  const stepButton = page.getByRole('button', { name: '＋15分' });\n  await advanceTime(page, stepButton, 24);\n  await page.screenshot({ path: path.join(outputDir, '03-noon-residential.png'), fullPage: true });\n  await advanceTime(page, stepButton, 24);\n  await page.screenshot({ path: path.join(outputDir, '04-evening-residential.png'), fullPage: true });\n  await advanceTime(page, stepButton, 12);\n  await page.screenshot({ path: path.join(outputDir, '05-night-residential.png'), fullPage: true });\n  await page.getByRole('button', { name: '朝へ戻す' }).click();\n  await page.waitForTimeout(900);\n  await developerSummary.click();\n\n  let reachedPark = false;\n  for (let attempt = 0; attempt < 14; attempt += 1) {",
              "  await page.getByRole('button', { name: 'HUDを隠す' }).click();\n  await developerSummary.click();\n  await page.screenshot({ path: path.join(outputDir, '02-morning-residential.png'), fullPage: true });\n\n  const captureAt = async (steps, filename) => {\n    await developerSummary.click();\n    const stepButton = page.getByRole('button', { name: '＋15分' });\n    await advanceTime(page, stepButton, steps);\n    await developerSummary.click();\n    await page.screenshot({ path: path.join(outputDir, filename), fullPage: true });\n  };\n  await captureAt(24, '03-noon-residential.png');\n  await captureAt(24, '04-evening-residential.png');\n  await captureAt(12, '05-night-residential.png');\n\n  await developerSummary.click();\n  await page.getByRole('button', { name: '朝へ戻す' }).click();\n  await page.getByRole('button', { name: 'HUDを表示' }).click();\n  await developerSummary.click();\n  await page.waitForTimeout(900);\n\n  let reachedPark = false;\n  for (let attempt = 0; attempt < 45; attempt += 1) {",
          )
          text = text.replace(
              "  await page.screenshot({ path: path.join(outputDir, '06-morning-park.png'), fullPage: true });",
              "  await developerSummary.click();\n  await page.getByRole('button', { name: 'HUDを隠す' }).click();\n  await developerSummary.click();\n  await page.screenshot({ path: path.join(outputDir, '06-morning-park.png'), fullPage: true });",
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Verify source quality
        run: |
          npm ci --no-audit --no-fund
          npm run check
      - name: Commit and remove one-time workflow
        run: |
          rm .github/workflows/m11-smoke-autofix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/browser-smoke.mjs .github/workflows/m11-smoke-autofix.yml
          git commit -m 'test: strengthen M1.1 visual and traversal evidence'
          git push origin HEAD:feat/m1-1-visual-complete
