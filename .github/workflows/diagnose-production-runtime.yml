name: Diagnose Production Runtime

on:
  push:
    branches:
      - diag/m1-black-screen
    paths:
      - .github/workflows/diagnose-production-runtime.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Capture browser console and screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm install --no-save --no-package-lock playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Inspect Vercel Production
        env:
          PRODUCTION_URL: https://boku-no-jihanki.vercel.app
        run: |
          mkdir -p diagnostics/browser
          cat > /tmp/diagnose.mjs <<'SCRIPT'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const output = [];
          const record = (kind, value) => {
            const text = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
            output.push(`[${kind}] ${text}`);
            console.log(`[${kind}] ${text}`);
          };

          const browser = await chromium.launch({
            headless: true,
            args: ['--use-gl=swiftshader', '--enable-webgl', '--ignore-gpu-blocklist'],
          });
          const context = await browser.newContext({
            viewport: { width: 1600, height: 900 },
            deviceScaleFactor: 1,
            locale: 'ja-JP',
          });
          const page = await context.newPage();
          page.on('console', (message) => record(`console:${message.type()}`, message.text()));
          page.on('pageerror', (error) => record('pageerror', error.stack ?? error.message));
          page.on('requestfailed', (request) => record('requestfailed', `${request.method()} ${request.url()} :: ${request.failure()?.errorText}`));
          page.on('response', (response) => {
            if (response.status() >= 400) record('http', `${response.status()} ${response.url()}`);
          });

          const url = `${process.env.PRODUCTION_URL}/?diagnostic=${Date.now()}`;
          record('navigate', url);
          const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
          record('document-status', response?.status() ?? null);
          await page.screenshot({ path: 'diagnostics/browser/before-start.png', fullPage: true });

          const startButton = page.getByRole('button', { name: '夏休みを始める' });
          record('start-button-count', await startButton.count());
          if (await startButton.count()) {
            await startButton.click();
          }
          await page.waitForTimeout(7000);
          await page.screenshot({ path: 'diagnostics/browser/after-start.png', fullPage: true });

          const state = await page.evaluate(() => {
            const canvases = [...document.querySelectorAll('canvas')].map((canvas) => ({
              width: canvas.width,
              height: canvas.height,
              clientWidth: canvas.clientWidth,
              clientHeight: canvas.clientHeight,
              rect: canvas.getBoundingClientRect().toJSON(),
            }));
            const testCanvas = document.createElement('canvas');
            const webgl2 = Boolean(testCanvas.getContext('webgl2'));
            const webgl = Boolean(testCanvas.getContext('webgl'));
            return {
              title: document.title,
              bodyText: document.body.innerText,
              canvasCount: canvases.length,
              canvases,
              webgl,
              webgl2,
              userAgent: navigator.userAgent,
              visibilityState: document.visibilityState,
            };
          });
          record('page-state', state);
          fs.writeFileSync('diagnostics/browser/runtime.log', `${output.join('\n')}\n`);
          fs.writeFileSync('diagnostics/browser/state.json', `${JSON.stringify(state, null, 2)}\n`);
          await context.tracing.start({ screenshots: true, snapshots: true, sources: true });
          await page.reload({ waitUntil: 'networkidle' });
          await page.getByRole('button', { name: '夏休みを始める' }).click();
          await page.waitForTimeout(3000);
          await context.tracing.stop({ path: 'diagnostics/browser/trace.zip' });
          await browser.close();
          SCRIPT
          node /tmp/diagnose.mjs

      - name: Upload browser diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m1-production-browser-diagnostics
          path: diagnostics/browser
          if-no-files-found: error
          retention-days: 7
