name: Complete M1.2 Painterly Raster Implementation

on:
  push:
    branches:
      - feat/m1-2-painterly-raster
    paths:
      - '.github/workflows/m12-complete.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write
  actions: read

concurrency:
  group: complete-m12-painterly-raster
  cancel-in-progress: false

jobs:
  complete:
    name: Apply, verify, merge and validate M1.2
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REPOSITORY: nodako1/BokuNoJihanki
      FEATURE_BRANCH: feat/m1-2-painterly-raster
      PR_NUMBER: '16'
      PRODUCTION_URL: https://boku-no-jihanki.vercel.app
      GH_TOKEN: ${{ github.token }}

