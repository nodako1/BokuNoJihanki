      - name: Generate approved painterly raster assets
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check pillow opencv-python-headless cairosvg
          python tools/art/generate_m12_assets.py
          rm -f tools/art/reference/m12-approved-concept.jpg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run full quality check
        run: npm run check

      - name: Install Playwright Chromium
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Start local production build
        shell: bash
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/m12-preview.log 2>&1 &
          for attempt in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/m12-preview.log
          exit 1

      - name: Operate M1.2 local production build
        env:
          BASE_URL: http://127.0.0.1:4173
          EXPECTED_COMMIT: ${{ github.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/m12-local-browser
          PRODUCTION_WAIT_MS: '30000'
        run: node scripts/browser-smoke.mjs

      - name: Upload local browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12-local-browser-${{ github.run_id }}
          path: diagnostics/m12-local-browser
          if-no-files-found: error
          retention-days: 14

      - name: Commit verified M1.2 implementation
        id: feature_commit
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: implement M1.2 painterly raster world'
          FEATURE_SHA=$(git rev-parse HEAD)
          echo "sha=${FEATURE_SHA}" >> "$GITHUB_OUTPUT"
          git push origin HEAD:${FEATURE_BRANCH}

      - name: Mark Pull Request ready and update description
        shell: bash
        run: |
          gh pr ready "${PR_NUMBER}" --repo "${REPOSITORY}" || true
          gh pr edit "${PR_NUMBER}" --repo "${REPOSITORY}" \
            --title 'feat: M1.2 ペインターリー高精細アートパイプライン' \
            --body "$(cat <<'BODY'
          M1.1の移動・衝突・Yソート・ストリーミング・時間帯・環境音を維持したまま、承認済みコンセプト画像を基準とする高精細ラスターペイント世界へ移行します。

          実装内容:
          - 住宅街西・東、公園西・東の4チャンク
          - 朝・昼・夕方・夜の背景差分
          - 透過前景によるオクルージョン
          - 4方向ラスタープレイヤー
          - WebP最適化と決定論的アセット生成
          - M1.2用Production SmokeとBrowser Smoke
          - README、PROJECT_STATE、仕様・アート・テスト・デプロイ文書

          このワークフロー内でnpm run checkとPlaywrightによるローカル本番操作確認を通過しています。成功後に自動でmainへマージし、Vercel ProductionとProduction Browser Smokeまで検証します。
          BODY
          )" || true

      - name: Wait for Pull Request mergeability
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            MERGEABLE=$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.mergeable // false')
            STATE=$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq .state)
            echo "PR state=${STATE}, mergeable=${MERGEABLE} (${attempt}/30)"
            if [[ "${STATE}" != "open" ]]; then
              echo "Pull Request is no longer open." >&2
              exit 1
            fi
            if [[ "${MERGEABLE}" == "true" ]]; then
              exit 0
            fi
            sleep 4
          done
          echo 'Timed out waiting for Pull Request mergeability.' >&2
          exit 1

      - name: Merge verified M1.2 Pull Request
        id: merge
        shell: bash
        run: |
          HEAD_SHA=$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq .head.sha)
          if [[ "${HEAD_SHA}" != "${{ steps.feature_commit.outputs.sha }}" ]]; then
            echo "Unexpected PR head: ${HEAD_SHA}" >&2
            exit 1
          fi
          RESPONSE=$(gh api --method PUT "repos/${REPOSITORY}/pulls/${PR_NUMBER}/merge" \
            -f merge_method=merge \
            -f sha="${HEAD_SHA}" \
            -f commit_title='feat: M1.2 ペインターリー高精細アートパイプライン')
          MERGED=$(jq -r .merged <<<"${RESPONSE}")
          MERGE_SHA=$(jq -r .sha <<<"${RESPONSE}")
          if [[ "${MERGED}" != "true" || -z "${MERGE_SHA}" || "${MERGE_SHA}" == "null" ]]; then
            echo "Merge failed: ${RESPONSE}" >&2
            exit 1
          fi
          echo "sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Wait for Vercel Production
        shell: bash
        run: |
          MERGE_SHA='${{ steps.merge.outputs.sha }}'
          for attempt in $(seq 1 120); do
            STATE=$(gh api "repos/${REPOSITORY}/commits/${MERGE_SHA}/status" \
              --jq '[.statuses[] | select(.context=="Vercel")][0].state // "missing"')
            echo "Vercel state: ${STATE} (${attempt}/120)"
            if [[ "${STATE}" == "success" ]]; then
              exit 0
            fi
            if [[ "${STATE}" == "failure" || "${STATE}" == "error" ]]; then
              exit 1
            fi
            sleep 10
          done
          echo 'Timed out waiting for Vercel Production.' >&2
          exit 1

      - name: Verify Production M1.2 bundle
        shell: bash
        run: |
          MERGE_SHA='${{ steps.merge.outputs.sha }}'
          curl --fail --silent --show-error --location \
            --retry 8 --retry-all-errors --retry-delay 5 \
            "${PRODUCTION_URL}/?commit=${MERGE_SHA}&smoke=$(date +%s)" -o /tmp/index.html
          mapfile -t SCRIPTS < <(grep -oE 'src="/assets/[^" ]+\.js"' /tmp/index.html | sed -E 's/^src="(.*)"$/\1/' | sort -u)
          test ${#SCRIPTS[@]} -gt 0
          : > /tmp/production-bundle.js
          for script in "${SCRIPTS[@]}"; do
            curl --fail --silent --show-error --location \
              --retry 6 --retry-all-errors --retry-delay 3 \
              "${PRODUCTION_URL}${script}" >> /tmp/production-bundle.js
          done
          grep -q 'M1.2 PAINTERLY HUD' /tmp/production-bundle.js
          grep -q 'assets/images/m12' /tmp/production-bundle.js
          grep -q 'なつかぜ公園' /tmp/production-bundle.js

      - name: Operate deployed M1.2 Production
        env:
          BASE_URL: https://boku-no-jihanki.vercel.app
          EXPECTED_COMMIT: ${{ steps.merge.outputs.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/m12-production-browser
          PRODUCTION_WAIT_MS: '900000'
        run: node scripts/browser-smoke.mjs

      - name: Upload Production browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12-production-browser-${{ github.run_id }}
          path: diagnostics/m12-production-browser
          if-no-files-found: error
          retention-days: 14

      - name: Finalize M1.2 documentation on main
        shell: bash
        run: |
          MERGE_SHA='${{ steps.merge.outputs.sha }}'
          git fetch origin main
          git checkout -B main origin/main
          python - "${MERGE_SHA}" "${GITHUB_RUN_ID}" <<'PY'
          import json
          import re
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          merge_sha, run_id = sys.argv[1:]
          state_path = Path('PROJECT_STATE.json')
          state = json.loads(state_path.read_text())
          state['currentMilestone'] = 'M1.2'
          state['status'] = 'completed-production-verified'
          state['lastProductionCommit'] = merge_sha
          state['inProgress'] = []
          completed = list(state.get('completed', []))
          for item in [
              'm1.2-approved-concept-raster-master',
              'm1.2-four-chunk-time-of-day-backgrounds',
              'm1.2-foreground-occlusion-layers',
              'm1.2-raster-player-sprites',
              'm1.2-quality-passed',
              'm1.2-browser-smoke-passed',
              'm1.2-main-merged',
              'm1.2-vercel-production-deployed',
              'm1.2-production-smoke-passed',
              'm1.2-production-browser-smoke-passed',
              'm1.2-production-visual-evidence-captured',
          ]:
              if item not in completed:
                  completed.append(item)
          state['completed'] = completed
          state['nextMilestone'] = 'M2'
          state['nextTask'] = 'vending-machine-search-and-money-system'
          state['knownIssues'] = [
              issue for issue in state.get('knownIssues', [])
              if issue.get('severity') != 'temporary'
          ]
          state['lastUpdated'] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          state['developmentRulesVersion'] = '2.3'
          evidence = dict(state.get('evidence', {}))
          evidence.update({
              'm12ImplementationPullRequest': 16,
              'm12ProductionCommit': merge_sha,
              'm12ProductionBrowserEvidenceRun': int(run_id),
          })
          state['evidence'] = evidence
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n')

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace('現在のマイルストーンは**M1.2 ペインターリー高精細アートパイプライン**です。', 'マイルストーン **M1.2 ペインターリー高精細アートパイプライン 完了・Production実ブラウザー確認済み**です。')
          text = re.sub(r'作業ブランチは`feat/m1-2-painterly-raster`、Pull Requestは`#16`です。現時点のProduction確認済みコードはM1.1の`[^`]+`です。M1.2はQuality、Browser Smoke、mainマージ、Production Smoke、Production Browser Smoke後に完了へ確定します。', f'M1.2実装Pull Requestは`#16`、Production確認済みコミットは`{merge_sha}`です。Quality、Browser Smoke、Production Smoke、Production Browser Smokeに成功しています。', text)
          readme.write_text(text)

          spec = Path('docs/specs/M1_2_PAINTERLY.md')
          if spec.exists():
              s = spec.read_text()
              s = s.replace('**実装中／Pull Request #16**', '**完了・Vercel Production実ブラウザー確認済み**')
              s += f'\n\n## Production確認結果\n\n- Pull Request: #16\n- Production commit: `{merge_sha}`\n- Production Browser Evidence run: `{run_id}`\n- Quality / Browser Smoke / Production Smoke / Production Browser Smoke: success\n'
              spec.write_text(s)
          PY
          npm run validate
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md PROJECT_STATE.json docs/specs/M1_2_PAINTERLY.md
          git commit -m 'docs: finalize M1.2 Production verification [skip ci]'
          git push origin HEAD:main
