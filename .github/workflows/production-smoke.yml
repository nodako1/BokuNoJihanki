name: Production Smoke

on:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify Vercel Production contains M1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      PRODUCTION_URL: https://boku-no-jihanki.vercel.app

    steps:
      - name: Wait for Vercel production deployment
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            STATE=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status" --jq '[.statuses[] | select(.context=="Vercel")][0].state // "missing"')
            echo "Vercel state: ${STATE} (attempt ${attempt}/60)"
            if [[ "${STATE}" == "success" ]]; then
              exit 0
            fi
            if [[ "${STATE}" == "failure" || "${STATE}" == "error" ]]; then
              echo "Vercel deployment failed for ${GITHUB_SHA}." >&2
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for Vercel deployment." >&2
          exit 1

      - name: Verify production HTML and M1 bundle marker
        shell: bash
        run: |
          curl --fail --silent --show-error --location \
            --retry 6 --retry-all-errors --retry-delay 5 \
            "${PRODUCTION_URL}/?commit=${GITHUB_SHA}" -o /tmp/index.html

          mapfile -t SCRIPTS < <(grep -oE 'src="/assets/[^"]+\.js"' /tmp/index.html | sed -E 's/^src="(.*)"$/\1/' | sort -u)
          if [[ ${#SCRIPTS[@]} -eq 0 ]]; then
            echo "No JavaScript bundle was found in Production HTML." >&2
            cat /tmp/index.html >&2
            exit 1
          fi

          : > /tmp/production-bundle.js
          for script in "${SCRIPTS[@]}"; do
            curl --fail --silent --show-error --location \
              --retry 4 --retry-all-errors --retry-delay 3 \
              "${PRODUCTION_URL}${script}" >> /tmp/production-bundle.js
          done

          grep -q 'M1 STREAMING HUD' /tmp/production-bundle.js
          grep -q 'なつかぜ公園' /tmp/production-bundle.js
          echo "Production contains the M1 streaming exploration bundle."
