name: Production Smoke

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - PROJECT_STATE.json
      - docs/**

permissions:
  contents: read
  statuses: write

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify Vercel Production contains approved M1.5
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      PRODUCTION_URL: https://boku-no-jihanki.vercel.app

    steps:
      - name: Mark production smoke pending
        shell: bash
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='Production Smoke' \
            -f description='Waiting for Vercel Production and approved M1.5 bundle' \
            -f target_url="${PRODUCTION_URL}"

      - name: Verify Vercel Production and approved M1.5 bundle
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 120); do
            STATE=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status" --jq '[.statuses[] | select(.context=="Vercel")][0].state // "missing"')
            echo "Vercel state: ${STATE} (attempt ${attempt}/120)"
            if [[ "${STATE}" == "success" ]]; then
              break
            fi
            if [[ "${STATE}" == "failure" || "${STATE}" == "error" ]]; then
              echo "Vercel deployment failed for ${GITHUB_SHA}." >&2
              exit 1
            fi
            if [[ "${attempt}" == "120" ]]; then
              echo "Timed out waiting for Vercel deployment." >&2
              exit 1
            fi
            sleep 10
          done

          CACHE_BUSTER="commit=${GITHUB_SHA}&m15-smoke=$(date +%s)"
          curl --fail --silent --show-error --location \
            --retry 10 --retry-all-errors --retry-delay 5 \
            "${PRODUCTION_URL}/?${CACHE_BUSTER}" -o /tmp/index.html

          mapfile -t SCRIPTS < <(grep -oE 'src="/assets/[^" ]+\.js"' /tmp/index.html | sed -E 's/^src="(.*)"$/\1/' | sort -u)
          if [[ ${#SCRIPTS[@]} -eq 0 ]]; then
            echo "No JavaScript bundle was found in Production HTML." >&2
            cat /tmp/index.html >&2
            exit 1
          fi

          : > /tmp/production-bundle.js
          for script in "${SCRIPTS[@]}"; do
            curl --fail --silent --show-error --location \
              --retry 8 --retry-all-errors --retry-delay 3 \
              "${PRODUCTION_URL}${script}?${CACHE_BUSTER}" >> /tmp/production-bundle.js
          done

          grep -q 'M1.5 SIDE-SCROLL HUD' /tmp/production-bundle.js
          grep -q '/assets/images/m15' /tmp/production-bundle.js
          grep -q '/assets/audio/m15/summer-morning-loop-9ea9bb8b71d7.m4a' /tmp/production-bundle.js
          grep -Fq "${GITHUB_SHA}" /tmp/production-bundle.js
          grep -q 'home-street' /tmp/production-bundle.js
          grep -q 'life-road' /tmp/production-bundle.js
          grep -q 'upper-vending-lane' /tmp/production-bundle.js
          grep -q '上のエリアへ移動' /tmp/production-bundle.js
          grep -q '下のエリアへ移動' /tmp/production-bundle.js
          grep -q 'player-atlas' /tmp/production-bundle.js

          for asset in \
            asset-manifest.json \
            bg-home-street-ffd941607bd3-morning.webp \
            bg-life-road-bd033f51dd48-day.webp \
            bg-upper-vending-lane-58218a55afc2-night.webp \
            player-atlas-c02fff1f264e.webp \
            player-atlas-c02fff1f264e.json
          do
            curl --fail --silent --show-error --location \
              --retry 8 --retry-all-errors --retry-delay 3 \
              "${PRODUCTION_URL}/assets/images/m15/${asset}?${CACHE_BUSTER}" -o /dev/null
          done
          curl --fail --silent --show-error --location \
            --retry 8 --retry-all-errors --retry-delay 3 \
            "${PRODUCTION_URL}/assets/audio/m15/summer-morning-loop-9ea9bb8b71d7.m4a?${CACHE_BUSTER}" \
            -o /dev/null

          echo "Production contains the approved M1.5 three-area bundle, assets and BGM."

      - name: Publish production smoke status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.smoke.outcome }}" == "success" ]]; then
            STATE='success'
            DESCRIPTION='Vercel Production contains the approved M1.5 build'
          else
            STATE='failure'
            DESCRIPTION='Vercel Production did not pass the M1.5 verification'
          fi

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATE}" \
            -f context='Production Smoke' \
            -f description="${DESCRIPTION}" \
            -f target_url="${PRODUCTION_URL}"

      - name: Fail when production smoke failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
