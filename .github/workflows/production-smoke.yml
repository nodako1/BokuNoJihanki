name: Production Smoke

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - PROJECT_STATE.json
      - docs/**

permissions:
  contents: read
  statuses: write

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Launch and operate M1 on Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      PRODUCTION_URL: https://boku-no-jihanki.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Mark production smoke pending
        shell: bash
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state='pending' \
            -f context='Production Smoke' \
            -f description='Waiting for Vercel and browser gameplay verification' \
            -f target_url="${PRODUCTION_URL}"

      - name: Wait for Vercel and run browser gameplay smoke
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 60); do
            STATE=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/status" --jq '[.statuses[] | select(.context=="Vercel")][0].state // "missing"')
            echo "Vercel state: ${STATE} (attempt ${attempt}/60)"
            if [[ "${STATE}" == "success" ]]; then
              break
            fi
            if [[ "${STATE}" == "failure" || "${STATE}" == "error" ]]; then
              echo "Vercel deployment failed for ${GITHUB_SHA}." >&2
              exit 1
            fi
            if [[ "${attempt}" == "60" ]]; then
              echo "Timed out waiting for Vercel deployment." >&2
              exit 1
            fi
            sleep 10
          done

          npm ci --no-audit --no-fund
          npm install --no-save --package-lock=false --no-audit --no-fund playwright@1.55.0
          npx playwright install --with-deps chromium

          EXPECTED_COMMIT_SHA="${GITHUB_SHA}" \
          BROWSER_SMOKE_OUTPUT_DIR=/tmp/production-browser-smoke \
          node scripts/browser-smoke.mjs "${PRODUCTION_URL}/?commit=${GITHUB_SHA}"

      - name: Upload production browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-browser-smoke-${{ github.sha }}
          path: /tmp/production-browser-smoke
          if-no-files-found: warn
          retention-days: 14

      - name: Publish production smoke status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.smoke.outcome }}" == "success" ]]; then
            STATE='success'
            DESCRIPTION='Production launched, rendered, moved and entered the park'
          else
            STATE='failure'
            DESCRIPTION='Production failed browser launch or gameplay verification'
          fi

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATE}" \
            -f context='Production Smoke' \
            -f description="${DESCRIPTION}" \
            -f target_url="${PRODUCTION_URL}"

      - name: Fail when production smoke failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
