name: One-time Vercel M0 retry

on:
  schedule:
    - cron: '37 3 22 7 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retry:
    name: Trigger production deployment after the Hobby build window resets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create one-time production marker
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" && "$(date -u +%Y-%m-%d)" != "2026-07-22" ]]; then
            echo "This one-time retry is no longer active."
            exit 0
          fi

          printf 'M0 production retry requested at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .vercel-production-retry
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .vercel-production-retry
          git commit -m "chore: retry M0 Vercel production deployment"
          git push origin HEAD:main
