name: Apply Verified M1.2 Implementation

on:
  push:
    branches:
      - ci/m12-apply-final
    paths:
      - '.github/workflows/m12-apply-final.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: m12-apply-final
  cancel-in-progress: false

jobs:
  apply:
    name: Restore, verify and push M1.2 implementation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout latest M1.2 feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/m1-2-painterly-raster
          fetch-depth: 0

      - name: Align with latest remote feature branch
        shell: bash
        run: |
          git fetch origin feat/m1-2-painterly-raster
          git reset --hard origin/feat/m1-2-painterly-raster

      - name: Restore prepared M1.2 implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import io
          import tarfile

          workflow = Path('.github/workflows/m12-complete.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "cat > /tmp/m12payload.b64 <<'PAYLOAD'"
          if marker not in text:
              raise SystemExit('M1.2 payload marker was not found in m12-complete.yml')

          encoded_lines = []
          collecting = False
          for line in text[text.index(marker):].splitlines():
              if not collecting:
                  if marker in line:
                      collecting = True
                  continue
              if line.strip() == 'PAYLOAD':
                  break
              encoded_lines.append(line.strip())

          encoded = ''.join(encoded_lines)
          payload = base64.b64decode(encoded, validate=True)
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall('.', filter='data')
          print(f'Restored {len(payload):,} compressed payload bytes.')
          PY

          rm -rf .m12-bootstrap
          rm -f .github/workflows/m12-complete.yml
          rm -f .github/workflows/m12-export-repository.yml
          rm -f .github/workflows/m12-probe-payload.yml
          rm -f .github/workflows/m12-bootstrap-run.yml
          rm -f .github/workflows/m12-bootstrap-fast.yml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate approved painterly raster assets
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check pillow opencv-python-headless cairosvg
          python tools/art/generate_m12_assets.py
          rm -f tools/art/reference/m12-approved-concept.jpg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run complete quality check
        run: npm run check

      - name: Install Playwright Chromium
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Start local production build
        shell: bash
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/m12-preview.log 2>&1 &
          for attempt in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/m12-preview.log
          exit 1

      - name: Operate M1.2 local production build
        env:
          BASE_URL: http://127.0.0.1:4173
          EXPECTED_COMMIT: ${{ github.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/m12-local-browser
          PRODUCTION_WAIT_MS: '30000'
        run: node scripts/browser-smoke.mjs

      - name: Upload verified local browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12-apply-final-browser-${{ github.run_id }}
          path: diagnostics/m12-local-browser
          if-no-files-found: error
          retention-days: 14

      - name: Commit and push verified M1.2 implementation
        shell: bash
        run: |
          rm -rf diagnostics
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: implement M1.2 painterly raster world'

          for attempt in 1 2 3; do
            if git push origin HEAD:feat/m1-2-painterly-raster; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto latest feature branch."
            git fetch origin feat/m1-2-painterly-raster
            git rebase origin/feat/m1-2-painterly-raster
          done

          echo 'Unable to push verified M1.2 implementation after three attempts.' >&2
          exit 1
