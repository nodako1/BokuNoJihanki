name: Finalize M1.3 Production Documentation

on:
  push:
    branches:
      - ci/m13-docs-finalize
    paths:
      - '.github/workflows/m13-docs-finalize.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: m13-docs-finalize
  cancel-in-progress: false

jobs:
  finalize-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: nodako1/BokuNoJihanki
      PRODUCTION_URL: https://boku-no-jihanki.vercel.app
    steps:
      - name: Wait until M1.3 PR is merged and Production is verified
        id: evidence
        run: |
          set -euo pipefail
          MERGE_SHA=''
          PROD_BROWSER_RUN=''
          for attempt in $(seq 1 360); do
            PR_STATE=$(gh api repos/$REPO/pulls/22 --jq '.state')
            MERGED=$(gh api repos/$REPO/pulls/22 --jq '.merged')
            if [[ "$MERGED" == true ]]; then
              MERGE_SHA=$(gh api repos/$REPO/pulls/22 --jq '.merge_commit_sha')
              gh api repos/$REPO/commits/$MERGE_SHA/status > /tmp/status.json
              VERCEL=$(jq -r '[.statuses[] | select(.context=="Vercel")][0].state // "missing"' /tmp/status.json)
              SMOKE=$(jq -r '[.statuses[] | select(.context=="Production Smoke")][0].state // "missing"' /tmp/status.json)
              PROD_BROWSER_RUN=$(gh run list --repo $REPO --commit "$MERGE_SHA" --workflow 'Browser Smoke' --limit 5 --json databaseId,status,conclusion,event --jq '[.[] | select(.event=="push" and .status=="completed" and .conclusion=="success")][0].databaseId // empty')
              echo "merge=$MERGE_SHA Vercel=$VERCEL Smoke=$SMOKE Browser=$PROD_BROWSER_RUN attempt=$attempt"
              if [[ "$VERCEL" == success && "$SMOKE" == success && -n "$PROD_BROWSER_RUN" ]]; then
                break
              fi
            else
              echo "PR #22 not merged yet (state=$PR_STATE), attempt=$attempt"
            fi
            if [[ "$attempt" == 360 ]]; then
              echo 'Timed out waiting for M1.3 Production verification.' >&2
              exit 1
            fi
            sleep 10
          done
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          echo "browser_run=$PROD_BROWSER_RUN" >> "$GITHUB_OUTPUT"

      - name: Checkout verified main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create final documentation branch
        run: |
          git checkout -B docs/m13-production-complete

      - name: Finalize README, PROJECT_STATE and M1.3 documents
        env:
          MERGE_SHA: ${{ steps.evidence.outputs.merge_sha }}
          BROWSER_RUN: ${{ steps.evidence.outputs.browser_run }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, os, re
          merge=os.environ['MERGE_SHA']
          browser=os.environ['BROWSER_RUN']
          production='https://boku-no-jihanki.vercel.app/'

          state_path=Path('PROJECT_STATE.json')
          state=json.loads(state_path.read_text(encoding='utf-8'))
          state['currentMilestone']='M1.3'
          state['status']='completed-production-verified'
          state['productionBranch']='main'
          state['productionUrl']=production.rstrip('/')
          state['lastProductionCommit']=merge
          completed=list(state.get('completed',[]))
          for item in [
              'm1.3-residential-dedicated-map',
              'm1.3-tiled-compatible-map-layers',
              'm1.3-walkable-polygon-movement',
              'm1.3-foot-circle-collision',
              'm1.3-substep-tunneling-prevention',
              'm1.3-wall-slide-resolution',
              'm1.3-four-direction-36-frame-player-atlas',
              'm1.3-contact-synchronised-footsteps',
              'm1.3-horizontal-look-ahead-camera',
              'm1.3-area-transition-foundation',
              'm1.3-pr-quality-passed',
              'm1.3-pr-browser-smoke-passed',
              'm1.3-main-merged',
              'm1.3-vercel-production-deployed',
              'm1.3-production-smoke-passed',
              'm1.3-production-browser-smoke-passed',
              'm1.3-production-visual-evidence-captured',
              'm1.3-documentation-finalized'
          ]:
              if item not in completed: completed.append(item)
          state['completed']=completed
          state['inProgress']=[]
          state['nextMilestone']='M2'
          state['nextTask']='vending-machine-search-and-money-system-on-m1.3'
          state['lastUpdated']='2026-07-23T06:00:00Z'
          state['developmentRulesVersion']='2.4'
          evidence=state.setdefault('evidence',{})
          evidence.update({
              'm13ImplementationPullRequest':22,
              'm13ProductionCommit':merge,
              'm13ProductionBrowserRun':int(browser),
              'm13ApplyRun':29977532042,
              'm13MapWidth':5120,
              'm13MapHeight':720,
              'm13PlayerAtlasFrames':36,
              'm13MovementModel':'belt-scroll-2.5d-walkable-polygons',
              'pageErrors':0,
              'failedRequests':0
          })
          known=state.get('knownIssues',[])
          known=[item for item in known if 'right-, left-, and up-facing' not in str(item.get('description','')) and 'four M1.2 chunks' not in str(item.get('description',''))]
          known.append({'severity':'light','description':'M1.3 intentionally exposes only the dedicated residential vertical slice. Park and other areas must be rebuilt as independent scenes before being restored.'})
          known.append({'severity':'light','description':'Representative iPhone and Android performance and touch feel still require device confirmation before formal release.'})
          state['knownIssues']=known
          state_path.write_text(json.dumps(state,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')

          readme=Path('README.md').read_text(encoding='utf-8')
          block=f'''## 現在の状態\n\nバージョン`0.1.0`、マイルストーン **M1.3 住宅街プレイアブル縦切り再構築 完了・Production実ブラウザー確認済み**です。\n\nM1.2の高精細な世界観を維持しながら、画像全域の自由移動を廃止し、住宅街専用のベルトスクロール型2.5D探索へ再構築しました。道路・歩道・路地をwalkableポリゴンとして定義し、家・庭・屋根・塀・柵は歩行可能領域の外へ分離しています。主人公は4方向36フレームのTexture Atlasで歩き、接地フレームと足音を同期します。\n\n- M1.3 Pull Request: `#22`\n- Production確認済みコミット: `{merge}`\n- Vercel: `success`\n- Production Smoke: `success`\n- Production Browser Smoke: `success`（run `{browser}`）\n- Apply / PR Browser evidence run: `29977532042`\n- 状態: `completed-production-verified`\n- Production: {production}\n- 次のマイルストーン: **M2 自販機探索と所持金**\n\n### M1.3で確立したゲーム方式\n\n- 5,120×720の住宅街専用横長マップ\n- 主人公の家の前、生活道路、路地・曲がり角、自販機のある小交差点、公園方面出口\n- Tiled互換のbackground / ground / walkable / obstacles / occlusion / interactions / exits / spawn / cameraレイヤー\n- 足元円とwalkableポリゴンによる侵入制御\n- サブステップによるすり抜け防止と壁沿いスライド\n- 4方向36フレームの待機・歩行アニメーション\n- 接地フレーム同期の左右足音\n- 横方向look-ahead付きカメラと限定された奥行き移動\n- 公園などは独立Sceneとしてロード遷移する方針\n\n'''
          if '## 現在の状態' in readme:
              readme=re.sub(r'## 現在の状態\n.*?(?=\n## )',block.rstrip(),readme,count=1,flags=re.S)
          else:
              readme=readme.replace('\n## ', '\n'+block+'## ',1)
          Path('README.md').write_text(readme,encoding='utf-8')

          spec=Path('docs/specs/M1_3_RESIDENTIAL_VERTICAL_SLICE.md')
          if spec.exists():
              text=spec.read_text(encoding='utf-8')
              text=re.sub(r'\*\*状態[^\n]*', '**状態：完了・Production実ブラウザー確認済み**', text, count=1)
              text += f'''\n\n## Production確認結果\n\n- Pull Request: #22\n- Production commit: `{merge}`\n- Vercel: success\n- Production Smoke: success\n- Production Browser Smoke: success\n- Production Browser run: `{browser}`\n- Apply / PR Browser evidence run: `29977532042`\n- pageerror: 0\n- failed request: 0\n'''
              spec.write_text(text,encoding='utf-8')

          roadmap=Path('docs/ROADMAP.md')
          if roadmap.exists():
              text=roadmap.read_text(encoding='utf-8')
              text=re.sub(r'(## M1\.3[^\n]*)(?:—[^\n]*)?',r'\1 — 完了・Production実ブラウザー確認済み',text,count=1)
              if 'M1.3 Production確認済みコミット' not in text:
                  anchor='## M2'
                  note=f'\n- M1.3 Production確認済みコミット: `{merge}`\n- Production Browser Smoke run: `{browser}`\n\n'
                  text=text.replace(anchor,note+anchor,1)
              roadmap.write_text(text,encoding='utf-8')

          testing=Path('docs/TESTING.md')
          if testing.exists():
              text=testing.read_text(encoding='utf-8')
              text += f'''\n\n## M1.3 Production確認値\n\n- Pull Request: #22\n- Apply / PR Browser run: `29977532042`\n- Production commit: `{merge}`\n- Production Browser Smoke run: `{browser}`\n- Quality: success\n- Browser Smoke: success\n- Production Smoke: success\n- Production Browser Smoke: success\n- pageerror / failed request: 0\n'''
              testing.write_text(text,encoding='utf-8')

          deployment=Path('docs/DEPLOYMENT.md')
          if deployment.exists():
              text=deployment.read_text(encoding='utf-8')
              text += f'''\n\n## M1.3確認済みProduction\n\n- Pull Request: #22\n- Production commit: `{merge}`\n- Production: {production}\n- Vercel: success\n- Production Smoke: success\n- Production Browser Smoke: success\n- Production Browser run: `{browser}`\n'''
              deployment.write_text(text,encoding='utf-8')
          PY

      - name: Validate final documentation state
        run: |
          npm ci --no-audit --no-fund
          npm run validate

      - name: Commit and push final documentation branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md PROJECT_STATE.json docs
          git commit -m 'docs: finalize M1.3 Production verification [skip ci]'
          git push --force-with-lease origin HEAD:docs/m13-production-complete

      - name: Create and merge documentation PR
        env:
          MERGE_SHA: ${{ steps.evidence.outputs.merge_sha }}
          BROWSER_RUN: ${{ steps.evidence.outputs.browser_run }}
        run: |
          EXISTING=$(gh pr list --repo $REPO --head docs/m13-production-complete --state open --json number --jq '.[0].number // empty')
          if [[ -z "$EXISTING" ]]; then
            EXISTING=$(gh pr create --repo $REPO --head docs/m13-production-complete --base main \
              --title 'docs: M1.3 Production確認済み状態を確定' \
              --body "M1.3 Production commit \`$MERGE_SHA\`、Production Browser Smoke run \`$BROWSER_RUN\`をREADME、PROJECT_STATE、仕様書、ロードマップ、テスト、デプロイ文書へ確定します。")
            EXISTING=${EXISTING##*/}
          fi
          gh pr merge "$EXISTING" --repo $REPO --merge --admin \
            --subject 'docs: M1.3 Production確認済み状態を確定 [skip ci]' \
            --body 'Production実ブラウザー確認後の文書確定のみ。'

      - name: Close documentation workflow PR
        if: always()
        run: |
          PR=$(gh pr list --repo $REPO --head ci/m13-docs-finalize --state open --json number --jq '.[0].number // empty')
          if [[ -n "$PR" ]]; then gh pr close "$PR" --repo $REPO --comment '確認専用PRのためmainへマージせずクローズします。'; fi
