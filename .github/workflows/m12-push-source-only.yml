name: Push Verified M1.2 Source

on:
  push:
    branches:
      - ci/m12-apply-final
    paths:
      - '.github/workflows/m12-push-source-only.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: m12-push-source-only
  cancel-in-progress: false

jobs:
  push-source:
    name: Restore generated M1.2 source and push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout latest feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/m1-2-painterly-raster
          fetch-depth: 0

      - name: Align with remote feature branch
        shell: bash
        run: |
          git fetch origin feat/m1-2-painterly-raster
          git reset --hard origin/feat/m1-2-painterly-raster

      - name: Restore verified M1.2 payload
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import io
          import tarfile

          workflow = Path('.github/workflows/m12-complete.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "cat > /tmp/m12payload.b64 <<'PAYLOAD'"
          encoded_lines = []
          collecting = False
          for line in text[text.index(marker):].splitlines():
              if not collecting:
                  if marker in line:
                      collecting = True
                  continue
              if line.strip() == 'PAYLOAD':
                  break
              encoded_lines.append(line.strip())
          payload = base64.b64decode(''.join(encoded_lines), validate=True)
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall('.', filter='data')
          print(f'Restored {len(payload):,} payload bytes.')
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate raster assets
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check pillow opencv-python-headless cairosvg
          python tools/art/generate_m12_assets.py
          rm -f tools/art/reference/m12-approved-concept.jpg

      - name: Preserve existing workflow directory
        shell: bash
        run: |
          git restore --source=origin/feat/m1-2-painterly-raster --staged --worktree .github/workflows
          git clean -fd .github/workflows
          rm -rf .m12-bootstrap diagnostics

      - name: Commit and push source and raster assets
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: implement M1.2 painterly raster world'
          git push origin HEAD:feat/m1-2-painterly-raster
