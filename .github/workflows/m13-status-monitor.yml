name: Report M1.3 Workflow Status
# refresh: phaser-vector2-run

on:
  push:
    branches:
      - ci/m13-status-monitor
    paths:
      - '.github/workflows/m13-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query latest feature branch runs
        run: |
          gh run list --repo nodako1/BokuNoJihanki --branch feat/m1-3-residential-vertical-slice --limit 8 --json databaseId,name,event,status,conclusion,headSha,updatedAt,url > /tmp/runs.json
          python - <<'PY'
          import json
          from pathlib import Path
          runs=json.loads(Path('/tmp/runs.json').read_text())
          lines=['## M1.3 current workflow status','']
          for run in runs:
              lines.append(f"- [{run['databaseId']}]({run['url']}) {run['name']} / {run['event']}: **{run['status']} / {run.get('conclusion') or '—'}** (`{run['headSha'][:7]}`)")
          Path('/tmp/comment.md').write_text('\n'.join(lines)+'\n')
          PY
          gh api --method PATCH repos/nodako1/BokuNoJihanki/issues/comments/5053773195 -f body="$(cat /tmp/comment.md)"
