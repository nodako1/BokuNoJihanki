name: Report M1.3 Workflow Status
# refresh: apply-failure-details

on:
  push:
    branches:
      - ci/m13-status-monitor
    paths:
      - '.github/workflows/m13-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query failed apply log
        run: |
          gh run view 29975327711 --repo nodako1/BokuNoJihanki --log-failed > /tmp/failed.log || true
          tail -n 100 /tmp/failed.log > /tmp/tail.log
          {
            echo '## M1.3 apply failure details'
            echo
            echo '```text'
            cat /tmp/tail.log
            echo '```'
          } > /tmp/comment.md
          gh pr comment 22 --repo nodako1/BokuNoJihanki --body-file /tmp/comment.md
