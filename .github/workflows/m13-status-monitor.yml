name: Report M1.3 Workflow Status
# refresh: rerun-failure-log

on:
  push:
    branches:
      - ci/m13-status-monitor
    paths:
      - '.github/workflows/m13-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Inspect latest apply failure
        run: |
          gh run view 29977235978 --repo nodako1/BokuNoJihanki --log-failed > /tmp/failed.log || true
          tail -n 140 /tmp/failed.log > /tmp/tail.log
          {
            echo '## M1.3 rerun failure details'
            echo
            echo '```text'
            cat /tmp/tail.log
            echo '```'
          } > /tmp/comment.md
          gh api --method PATCH repos/nodako1/BokuNoJihanki/issues/comments/5053782184 -f body="$(cat /tmp/comment.md)"
