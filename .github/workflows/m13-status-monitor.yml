name: Report M1.3 Workflow Status
# refresh: current-apply

on:
  push:
    branches:
      - ci/m13-status-monitor
    paths:
      - '.github/workflows/m13-status-monitor.yml'
  workflow_dispatch:

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Query feature branch runs
        run: |
          gh run list --repo nodako1/BokuNoJihanki --branch feat/m1-3-residential-vertical-slice --limit 20 --json databaseId,name,event,status,conclusion,headSha,updatedAt,url > /tmp/runs.json
          python - <<'PY'
          import json
          from pathlib import Path
          runs=json.loads(Path('/tmp/runs.json').read_text())
          lines=['## M1.3 current workflow status','','| Run | Workflow | Event | Status | Conclusion | Head | Updated |','|---:|---|---|---|---|---|---|']
          for run in runs:
              lines.append(f"| [{run['databaseId']}]({run['url']}) | {run['name']} | {run['event']} | {run['status']} | {run.get('conclusion') or '—'} | `{run['headSha'][:7]}` | {run['updatedAt']} |")
          Path('/tmp/comment.md').write_text('\n'.join(lines)+'\n')
          PY
          gh pr comment 22 --repo nodako1/BokuNoJihanki --body-file /tmp/comment.md
