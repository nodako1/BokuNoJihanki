name: Finalize verified M1 v3

on:
  push:
    branches:
      - feat/m1-streaming-map
    paths:
      - .github/workflows/finalize-m1-v3.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: finalize-verified-m1-v3
  cancel-in-progress: false

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout final feature source
        uses: actions/checkout@v4
        with:
          ref: feat/m1-streaming-map
          fetch-depth: 0

      - name: Confirm complete M1 payload
        shell: bash
        run: |
          test ! -d bootstrap
          test ! -f .github/workflows/bootstrap-m1.yml
          test ! -f .github/workflows/source-snapshot.yml
          test -f docs/specs/M1_STREAMING_MAP.md
          grep -q '"currentMilestone": "M1"' PROJECT_STATE.json
          git fetch origin main
          CHANGED=$(git diff --name-only origin/main...HEAD)
          printf '%s\n' "$CHANGED" | grep -q '^src/'
          printf '%s\n' "$CHANGED" | grep -Eq '(stream|joystick|player|explor|world|map)' -i

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install exact dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint, typecheck, test and build
        run: npm run check

      - name: Remove all temporary M1 automation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/finalize-m1.yml
          rm -f .github/workflows/merge-m1-after-verification.yml
          git rm .github/workflows/finalize-m1-v3.yml
          git add -A
          git commit -m "chore: remove temporary M1 automation [skip ci]"
          git push origin HEAD:feat/m1-streaming-map

      - name: Mark PR ready
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr ready 4 --repo nodako1/BokuNoJihanki

      - name: Merge verified M1
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          HEAD_SHA=$(gh api repos/nodako1/BokuNoJihanki/pulls/4 --jq .head.sha)
          gh api --method PUT repos/nodako1/BokuNoJihanki/pulls/4/merge \
            -f merge_method=squash \
            -f sha="$HEAD_SHA" \
            -f commit_title='feat: M1 ロード無しストリーミングマップを実装'
