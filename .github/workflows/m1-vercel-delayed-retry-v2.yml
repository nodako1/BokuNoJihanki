name: One-time M1 Vercel production retry v2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/m1-vercel-delayed-retry-v2.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: m1-vercel-delayed-retry-v2
  cancel-in-progress: false

jobs:
  retry:
    name: Trigger M1 production after the Hobby build window resets
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Wait for Vercel build window
        run: sleep 3600

      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create one clean production commit
        shell: bash
        run: |
          git pull --ff-only origin main
          printf 'M1 production retry requested at %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .m1-vercel-production-retry
          rm -f .github/workflows/m1-vercel-delayed-retry.yml
          git rm .github/workflows/m1-vercel-delayed-retry-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: retry M1 Vercel production deployment"
          git push origin HEAD:main
