name: Source Snapshot

on:
  push:
    branches:
      - feat/m1-streaming-map
    paths:
      - .github/workflows/source-snapshot.yml
      - .m1-source-trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    name: Package repository source
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout M1 branch
        uses: actions/checkout@v4
        with:
          ref: feat/m1-streaming-map
          fetch-depth: 0

      - name: Package source
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.github/workflows/source-snapshot.yml \
            --exclude=.m1-source-trigger \
            -czf /tmp/boku-no-jihanki-source.tar.gz .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: boku-no-jihanki-source-${{ github.sha }}
          path: /tmp/boku-no-jihanki-source.tar.gz
          retention-days: 1
