name: Finalize M1

on:
  push:
    branches:
      - feat/m1-streaming-map
    paths:
      - .github/workflows/finalize-m1.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read
  statuses: read

concurrency:
  group: finalize-m1
  cancel-in-progress: false

jobs:
  verify-and-merge:
    name: Verify M1 and merge to main
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout M1 branch
        uses: actions/checkout@v4
        with:
          ref: feat/m1-streaming-map
          fetch-depth: 0

      - name: Confirm bootstrap completed
        shell: bash
        run: |
          test ! -d bootstrap
          test ! -f .github/workflows/bootstrap-m1.yml
          test ! -f .github/workflows/source-snapshot.yml
          test -f docs/specs/M1_STREAMING_MAP.md
          grep -q '"currentMilestone": "M1"' PROJECT_STATE.json
          git diff --name-only origin/main...HEAD | grep -q '^src/'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run complete quality check
        run: npm run check

      - name: Remove temporary finalizer
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/finalize-m1.yml
          git commit -m "chore: remove temporary M1 finalizer [skip ci]"
          git push origin HEAD:feat/m1-streaming-map

      - name: Mark pull request ready
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr ready 4 --repo nodako1/BokuNoJihanki || true

      - name: Merge verified M1
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge 4 --repo nodako1/BokuNoJihanki --squash --admin --delete-branch=false
