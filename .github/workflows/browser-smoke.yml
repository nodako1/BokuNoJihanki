name: Browser Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/fontconfig/**'
      - '.github/workflows/browser-smoke.yml'
      - '.github/workflows/production-smoke.yml'
      - '.vercel-production-retry'
      - 'PROJECT_STATE.json'
      - 'docs/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'scripts/browser-smoke.mjs'
      - 'scripts/run-headed-browser-smoke.sh'
      - 'src/**'
      - 'tools/evidence/**'
      - 'vercel.json'
      - 'vite.config.ts'
  push:
    branches:
      - main
    paths:
      - '.github/fontconfig/**'
      - '.github/workflows/browser-smoke.yml'
      - '.github/workflows/production-smoke.yml'
      - '.vercel-production-retry'
      - 'PROJECT_STATE.json'
      - 'docs/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'scripts/browser-smoke.mjs'
      - 'scripts/run-headed-browser-smoke.sh'
      - 'src/**'
      - 'tools/evidence/**'
      - 'vercel.json'
      - 'vite.config.ts'
  workflow_dispatch:

permissions:
  contents: read
  statuses: read

concurrency:
  group: browser-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Render and operate M1.5 (${{ matrix.device_id }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Screenshots, state and runtime logs are formal Evidence. Raw tracing
        # stays off so instrumentation cannot perturb input or retain a
        # protected Preview credential.
        include:
          - device_id: desktop-1280x720
            width: '1280'
            height: '720'
            dpr: '1'
            touch: 'false'
            trace: 'false'
          - device_id: touch-844x390
            width: '844'
            height: '390'
            dpr: '2'
            touch: 'true'
            trace: 'false'
          - device_id: touch-932x430-dpr3
            width: '932'
            height: '430'
            dpr: '3'
            touch: 'true'
            trace: 'false'
    env:
      M15_PREVIEW_URL: https://boku-no-jihanki-git-fix-m1-5-r-8c699e-rutantan88-7611s-projects.vercel.app
      M15_BASELINE_SHA: 29223ee31fd4fc4fbca21a37b01fe89277279647
      M15_RUNNER_OS_IMAGE: ubuntu-24.04
      BROWSER_HEADLESS: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build application
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: npm run build

      - name: Install browser, real X11 window manager and Japanese font
        run: |
          SETUP_ARTIFACT_DIR="diagnostics/baseline-${{ matrix.device_id }}"
          mkdir -p "$SETUP_ARTIFACT_DIR"
          exec > >(
            tee -a "$SETUP_ARTIFACT_DIR/render-environment-setup.log"
          ) 2>&1
          npm install --no-save --no-package-lock playwright@1.56.1
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            fontconfig \
            fonts-noto-cjk \
            openbox \
            x11-utils
          M15_FONTCONFIG_FILE="$(
            realpath .github/fontconfig/m15-noto-cjk.conf
          )"
          test -r "$M15_FONTCONFIG_FILE"
          export FONTCONFIG_FILE="$M15_FONTCONFIG_FILE"
          echo "FONTCONFIG_FILE=$M15_FONTCONFIG_FILE" >> "$GITHUB_ENV"
          printf 'Fontconfig policy file: %s\nSHA-256: %s\n' \
            "$M15_FONTCONFIG_FILE" \
            "$(sha256sum "$M15_FONTCONFIG_FILE" | cut -d ' ' -f 1)"
          fc-cache -f -v
          JAPANESE_FONT_PATTERN='sans-serif:lang=ja'
          CONFIGURED_JAPANESE_FONT_FAMILY="$(
            fc-pattern --config --default \
              --format='%{family[0]}' "$JAPANESE_FONT_PATTERN"
          )"
          JAPANESE_FONT_MATCH="$(
            fc-match --format='%{family[0]}' "$JAPANESE_FONT_PATTERN"
          )"
          JAPANESE_FONT_FILE="$(
            fc-match --format='%{file}' "$JAPANESE_FONT_PATTERN"
          )"
          EXPLICIT_NOTO_FONT_FILE="$(
            fc-match --format='%{file}' 'Noto Sans CJK JP:lang=ja'
          )"
          JAPANESE_FONT_PACKAGE_VERSION="$(
            dpkg-query --show --showformat='${Version}' fonts-noto-cjk
          )"
          JAPANESE_FONT_COUNT="$(fc-list :lang=ja | wc -l)"
          JAPANESE_FONT_OWNER="$(
            (dpkg-query --search "$JAPANESE_FONT_FILE" 2>/dev/null || true) \
              | awk -F: 'NR == 1 { print $1 }'
          )"
          printf 'Configured Japanese font family: %s\n' \
            "$CONFIGURED_JAPANESE_FONT_FAMILY"
          printf 'Resolved Japanese font family: %s\n' "$JAPANESE_FONT_MATCH"
          printf 'Resolved Japanese font file: %s\n' "$JAPANESE_FONT_FILE"
          printf 'Resolved Japanese font package: %s\n' "$JAPANESE_FONT_OWNER"
          printf 'Japanese font file count: %s\n' "$JAPANESE_FONT_COUNT"
          if [[ "$CONFIGURED_JAPANESE_FONT_FAMILY" != "Noto Sans CJK JP" ]]; then
            echo "Japanese sans-serif policy did not prepend Noto Sans CJK JP." >&2
            exit 1
          fi
          if [[ "$JAPANESE_FONT_MATCH" != "Noto Sans CJK JP" ]]; then
            echo "Japanese sans-serif did not resolve to Noto Sans CJK JP." >&2
            exit 1
          fi
          if [[ ! -f "$JAPANESE_FONT_FILE" ]]; then
            echo "Resolved Japanese font file does not exist." >&2
            exit 1
          fi
          if [[ "$JAPANESE_FONT_FILE" != "$EXPLICIT_NOTO_FONT_FILE" ]]; then
            echo "Generic and explicit Noto Japanese font files differ." >&2
            exit 1
          fi
          if [[ "$JAPANESE_FONT_OWNER" != "fonts-noto-cjk" ]]; then
            echo "Resolved Japanese font is not owned by fonts-noto-cjk." >&2
            exit 1
          fi
          if ! fc-query --format='%{family[0]}\n' "$JAPANESE_FONT_FILE" \
            | grep -Fxq 'Noto Sans CJK JP'; then
            echo "Resolved Japanese font file lacks the JP family." >&2
            exit 1
          fi
          if ! fc-query --format='%{lang}\n' "$JAPANESE_FONT_FILE" \
            | grep -Eq '(^|[|[:space:]])ja($|[|[:space:]])'; then
            echo "Resolved Japanese font file lacks Japanese coverage." >&2
            exit 1
          fi
          if [[ ! "$JAPANESE_FONT_COUNT" =~ ^[[:space:]]*[1-9][0-9]*$ ]]; then
            echo "No Japanese-capable fonts were enumerated." >&2
            exit 1
          fi
          JAPANESE_FONT_SHA256="$(
            sha256sum "$JAPANESE_FONT_FILE" | cut -d ' ' -f 1
          )"
          echo "M15_JAPANESE_FONT_MATCH=$JAPANESE_FONT_MATCH" >> "$GITHUB_ENV"
          echo "M15_JAPANESE_FONT_FILE=$JAPANESE_FONT_FILE" >> "$GITHUB_ENV"
          echo "M15_JAPANESE_FONT_PACKAGE_VERSION=$JAPANESE_FONT_PACKAGE_VERSION" \
            >> "$GITHUB_ENV"
          echo "M15_JAPANESE_FONT_SHA256=$JAPANESE_FONT_SHA256" >> "$GITHUB_ENV"
          openbox --version
          dpkg-query --show \
            --showformat='${binary:Package}\t${Version}\n' \
            fontconfig fonts-noto-cjk openbox x11-utils xvfb
          printf 'Japanese font: %s\nFile: %s\nSHA-256: %s\nCount: %s\n' \
            "$JAPANESE_FONT_MATCH" \
            "$JAPANESE_FONT_FILE" \
            "$JAPANESE_FONT_SHA256" \
            "$JAPANESE_FONT_COUNT"

      - name: Select headed Google Chrome with AAC support
        run: |
          CHROME_PATH="$(command -v google-chrome)"
          test -x "$CHROME_PATH"
          echo "BROWSER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          "$CHROME_PATH" --version

      - name: Prepare immutable baseline build
        if: github.event_name == 'pull_request'
        run: |
          test "$(git rev-parse "$M15_BASELINE_SHA^{commit}")" = "$M15_BASELINE_SHA"
          git diff --quiet "$M15_BASELINE_SHA" -- package.json package-lock.json
          BASELINE_ROOT="$RUNNER_TEMP/m15-baseline-${{ matrix.device_id }}"
          mkdir -p "$BASELINE_ROOT"
          git archive --format=tar "$M15_BASELINE_SHA" \
            | tar -xf - -C "$BASELINE_ROOT"
          test ! -e "$BASELINE_ROOT/node_modules"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$BASELINE_ROOT/node_modules"
          VERCEL_GIT_COMMIT_SHA="$M15_BASELINE_SHA" \
            npm --prefix "$BASELINE_ROOT" run build
          echo "BASELINE_ROOT=$BASELINE_ROOT" >> "$GITHUB_ENV"

      - name: Capture exact baseline in candidate browser environment
        if: github.event_name == 'pull_request'
        env:
          BASE_URL: http://127.0.0.1:4174
          EXPECTED_COMMIT: ${{ env.M15_BASELINE_SHA }}
          BROWSER_ARTIFACT_DIR: diagnostics/baseline-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
        run: |
          test -d "$BASELINE_ROOT"
          mkdir -p "$BROWSER_ARTIFACT_DIR"
          nohup npm --prefix "$BASELINE_ROOT" run preview -- \
            --host 127.0.0.1 --port 4174 \
            > "$BROWSER_ARTIFACT_DIR/vite-preview.log" 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent "$BASE_URL/" > /dev/null; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              cat "$BROWSER_ARTIFACT_DIR/vite-preview.log"
              exit 1
            fi
            sleep 1
          done
          xvfb-run -a bash scripts/run-headed-browser-smoke.sh \
            node tools/evidence/capture_m15_baseline.mjs

      - name: Start local production build
        if: github.event_name == 'pull_request'
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/vite-preview.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/vite-preview.log
          exit 1

      - name: Test exact local pull request build
        if: github.event_name == 'pull_request'
        env:
          BASE_URL: http://127.0.0.1:4173
          EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/local-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
          PRODUCTION_WAIT_MS: '30000'
        run: xvfb-run -a bash scripts/run-headed-browser-smoke.sh

      - name: Test exact Vercel Preview
        if: github.event_name == 'pull_request'
        env:
          BASE_URL: ${{ env.M15_PREVIEW_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/preview-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
          PRODUCTION_WAIT_MS: '900000'
        run: xvfb-run -a bash scripts/run-headed-browser-smoke.sh

      - name: Test exact deployed Production
        if: github.event_name != 'pull_request'
        env:
          BASE_URL: https://boku-no-jihanki.vercel.app
          EXPECTED_COMMIT: ${{ github.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/production-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
          PRODUCTION_WAIT_MS: '900000'
        run: xvfb-run -a bash scripts/run-headed-browser-smoke.sh

      - name: Upload screenshots, logs and trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ github.run_id }}-${{ matrix.device_id }}
          path: |
            diagnostics/baseline-${{ matrix.device_id }}
            diagnostics/local-${{ matrix.device_id }}
            diagnostics/preview-${{ matrix.device_id }}
            diagnostics/production-${{ matrix.device_id }}
          if-no-files-found: error
          retention-days: 14
