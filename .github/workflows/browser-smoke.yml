name: Browser Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/fontconfig/**'
      - '.github/workflows/browser-smoke.yml'
      - '.github/workflows/production-smoke.yml'
      - '.vercel-production-retry'
      - 'PROJECT_STATE.json'
      - 'docs/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'scripts/browser-smoke.mjs'
      - 'scripts/prepare-playwright-native-visibility.mjs'
      - 'scripts/run-headed-browser-smoke.sh'
      - 'scripts/x11-tab-visibility.mjs'
      - 'src/**'
      - 'tools/evidence/**'
      - 'vercel.json'
      - 'vite.config.ts'
  push:
    branches:
      - main
    paths:
      - '.github/fontconfig/**'
      - '.github/workflows/browser-smoke.yml'
      - '.github/workflows/production-smoke.yml'
      - '.vercel-production-retry'
      - 'PROJECT_STATE.json'
      - 'docs/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'scripts/browser-smoke.mjs'
      - 'scripts/prepare-playwright-native-visibility.mjs'
      - 'scripts/run-headed-browser-smoke.sh'
      - 'scripts/x11-tab-visibility.mjs'
      - 'src/**'
      - 'tools/evidence/**'
      - 'vercel.json'
      - 'vite.config.ts'
  workflow_dispatch:

permissions:
  contents: read
  statuses: read

concurrency:
  group: browser-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Render and operate M1.5 (${{ matrix.device_id }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Screenshots, state and runtime logs are formal Evidence. Raw tracing
        # stays off so instrumentation cannot perturb input or retain a
        # protected Preview credential.
        include:
          - device_id: desktop-1280x720
            width: '1280'
            height: '720'
            dpr: '1'
            touch: 'false'
            trace: 'false'
          - device_id: touch-844x390
            width: '844'
            height: '390'
            dpr: '2'
            touch: 'true'
            trace: 'false'
          - device_id: touch-932x430-dpr3
            width: '932'
            height: '430'
            dpr: '3'
            touch: 'true'
            trace: 'false'
    env:
      M15_PREVIEW_URL: https://boku-no-jihanki-git-fix-m1-5-r-8c699e-rutantan88-7611s-projects.vercel.app
      M15_BASELINE_SHA: 29223ee31fd4fc4fbca21a37b01fe89277279647
      M15_RUNNER_OS_IMAGE: ubuntu-24.04
      M15_GOOGLE_CHROME_VERSION: 150.0.7871.186
      M15_GOOGLE_CHROME_PACKAGE_VERSION: 150.0.7871.186-1
      M15_GOOGLE_CHROME_DEB_URL: https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_150.0.7871.186-1_amd64.deb
      M15_GOOGLE_CHROME_DEB_BYTES: '133561688'
      M15_GOOGLE_CHROME_DEB_SHA256: 4193e00b6d5d5969ee63f7a69596868f546aa0e8cb077b3e0bf9cc1e2c719d00
      M15_GOOGLE_CHROME_ELF_BYTES: '280960248'
      M15_GOOGLE_CHROME_ELF_SHA256: 47e00a55c9e412ccb3b5a128fdf3b34378faecb0190b293829ddee28c6d8659e
      BROWSER_HEADLESS: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build application
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: npm run build

      - name: Install browser, real X11 window manager and Japanese font
        run: |
          SETUP_ARTIFACT_DIR="diagnostics/baseline-${{ matrix.device_id }}"
          mkdir -p "$SETUP_ARTIFACT_DIR"
          exec > >(
            tee -a "$SETUP_ARTIFACT_DIR/render-environment-setup.log"
          ) 2>&1
          npm install --no-save --no-package-lock playwright@1.56.1
          node scripts/prepare-playwright-native-visibility.mjs \
            --artifact \
            "$SETUP_ARTIFACT_DIR/playwright-native-visibility-install.json"
          test -x node_modules/.bin/playwright
          ./node_modules/.bin/playwright install --with-deps chromium
          sudo apt-get update
          CHROME_DEB_PATH="$RUNNER_TEMP/google-chrome-stable.deb"
          curl --fail --location --silent --show-error \
            --proto '=https' \
            --tlsv1.2 \
            --retry 3 \
            --retry-all-errors \
            --output "$CHROME_DEB_PATH" \
            "$M15_GOOGLE_CHROME_DEB_URL"
          test "$(stat -c '%s' "$CHROME_DEB_PATH")" = \
            "$M15_GOOGLE_CHROME_DEB_BYTES"
          printf '%s  %s\n' \
            "$M15_GOOGLE_CHROME_DEB_SHA256" \
            "$CHROME_DEB_PATH" \
            | sha256sum --check --strict -
          test "$(dpkg-deb --field "$CHROME_DEB_PATH" Package)" = \
            "google-chrome-stable"
          test "$(dpkg-deb --field "$CHROME_DEB_PATH" Version)" = \
            "$M15_GOOGLE_CHROME_PACKAGE_VERSION"
          test "$(dpkg-deb --field "$CHROME_DEB_PATH" Architecture)" = \
            "amd64"
          printf 'Chrome package URL: %s\nPackage SHA-256: %s\n' \
            "$M15_GOOGLE_CHROME_DEB_URL" \
            "$M15_GOOGLE_CHROME_DEB_SHA256"
          sudo apt-get install --yes --allow-downgrades \
            --no-install-recommends \
            fontconfig \
            fonts-noto-cjk \
            "$CHROME_DEB_PATH" \
            openbox \
            xdotool \
            x11-utils
          test "$(
            dpkg-query --show --showformat='${Version}' google-chrome-stable
          )" = "$M15_GOOGLE_CHROME_PACKAGE_VERSION"
          M15_FONTCONFIG_FILE="$(
            realpath .github/fontconfig/m15-noto-cjk.conf
          )"
          test -r "$M15_FONTCONFIG_FILE"
          export FONTCONFIG_FILE="$M15_FONTCONFIG_FILE"
          echo "FONTCONFIG_FILE=$M15_FONTCONFIG_FILE" >> "$GITHUB_ENV"
          printf 'Fontconfig policy file: %s\nSHA-256: %s\n' \
            "$M15_FONTCONFIG_FILE" \
            "$(sha256sum "$M15_FONTCONFIG_FILE" | cut -d ' ' -f 1)"
          fc-cache -f -v
          JAPANESE_FONT_PATTERN='sans-serif:lang=ja'
          CONFIGURED_JAPANESE_FONT_FAMILY="$(
            fc-pattern --config --default \
              --format='%{family[0]}' "$JAPANESE_FONT_PATTERN"
          )"
          JAPANESE_FONT_MATCH="$(
            fc-match --format='%{family[0]}' "$JAPANESE_FONT_PATTERN"
          )"
          JAPANESE_FONT_FILE="$(
            fc-match --format='%{file}' "$JAPANESE_FONT_PATTERN"
          )"
          EXPLICIT_NOTO_FONT_FILE="$(
            fc-match --format='%{file}' 'Noto Sans CJK JP:lang=ja'
          )"
          JAPANESE_FONT_PACKAGE_VERSION="$(
            dpkg-query --show --showformat='${Version}' fonts-noto-cjk
          )"
          JAPANESE_FONT_COUNT="$(fc-list :lang=ja | wc -l)"
          JAPANESE_FONT_OWNER="$(
            (dpkg-query --search "$JAPANESE_FONT_FILE" 2>/dev/null || true) \
              | awk -F: 'NR == 1 { print $1 }'
          )"
          printf 'Configured Japanese font family: %s\n' \
            "$CONFIGURED_JAPANESE_FONT_FAMILY"
          printf 'Resolved Japanese font family: %s\n' "$JAPANESE_FONT_MATCH"
          printf 'Resolved Japanese font file: %s\n' "$JAPANESE_FONT_FILE"
          printf 'Resolved Japanese font package: %s\n' "$JAPANESE_FONT_OWNER"
          printf 'Japanese font file count: %s\n' "$JAPANESE_FONT_COUNT"
          if [[ "$CONFIGURED_JAPANESE_FONT_FAMILY" != "Noto Sans CJK JP" ]]; then
            echo "Japanese sans-serif policy did not prepend Noto Sans CJK JP." >&2
            exit 1
          fi
          if [[ "$JAPANESE_FONT_MATCH" != "Noto Sans CJK JP" ]]; then
            echo "Japanese sans-serif did not resolve to Noto Sans CJK JP." >&2
            exit 1
          fi
          if [[ ! -f "$JAPANESE_FONT_FILE" ]]; then
            echo "Resolved Japanese font file does not exist." >&2
            exit 1
          fi
          if [[ "$JAPANESE_FONT_FILE" != "$EXPLICIT_NOTO_FONT_FILE" ]]; then
            echo "Generic and explicit Noto Japanese font files differ." >&2
            exit 1
          fi
          if [[ "$JAPANESE_FONT_OWNER" != "fonts-noto-cjk" ]]; then
            echo "Resolved Japanese font is not owned by fonts-noto-cjk." >&2
            exit 1
          fi
          if ! fc-query --format='%{family[0]}\n' "$JAPANESE_FONT_FILE" \
            | grep -Fxq 'Noto Sans CJK JP'; then
            echo "Resolved Japanese font file lacks the JP family." >&2
            exit 1
          fi
          if ! fc-query --format='%{lang}\n' "$JAPANESE_FONT_FILE" \
            | grep -Eq '(^|[|[:space:]])ja($|[|[:space:]])'; then
            echo "Resolved Japanese font file lacks Japanese coverage." >&2
            exit 1
          fi
          if [[ ! "$JAPANESE_FONT_COUNT" =~ ^[[:space:]]*[1-9][0-9]*$ ]]; then
            echo "No Japanese-capable fonts were enumerated." >&2
            exit 1
          fi
          JAPANESE_FONT_SHA256="$(
            sha256sum "$JAPANESE_FONT_FILE" | cut -d ' ' -f 1
          )"
          echo "M15_JAPANESE_FONT_MATCH=$JAPANESE_FONT_MATCH" >> "$GITHUB_ENV"
          echo "M15_JAPANESE_FONT_FILE=$JAPANESE_FONT_FILE" >> "$GITHUB_ENV"
          echo "M15_JAPANESE_FONT_PACKAGE_VERSION=$JAPANESE_FONT_PACKAGE_VERSION" \
            >> "$GITHUB_ENV"
          echo "M15_JAPANESE_FONT_SHA256=$JAPANESE_FONT_SHA256" >> "$GITHUB_ENV"
          openbox --version
          dpkg-query --show \
            --showformat='${binary:Package}\t${Version}\n' \
            fontconfig fonts-noto-cjk openbox xdotool x11-utils xvfb
          printf 'Japanese font: %s\nFile: %s\nSHA-256: %s\nCount: %s\n' \
            "$JAPANESE_FONT_MATCH" \
            "$JAPANESE_FONT_FILE" \
            "$JAPANESE_FONT_SHA256" \
            "$JAPANESE_FONT_COUNT"

      - name: Select headed Google Chrome with AAC support
        run: |
          mapfile -t CHROME_PATHS < <(
            dpkg-query -L google-chrome-stable \
              | grep -Fx '/opt/google/chrome/chrome'
          )
          test "${#CHROME_PATHS[@]}" -eq 1
          CHROME_PATH="${CHROME_PATHS[0]}"
          test -x "$CHROME_PATH"
          test "$(readlink -f "$CHROME_PATH")" = "$CHROME_PATH"
          test "$(
            dpkg-query --show --showformat='${Version}' google-chrome-stable
          )" = "$M15_GOOGLE_CHROME_PACKAGE_VERSION"
          CHROME_VERSION="$(
            "$CHROME_PATH" --version | sed -E 's/[[:space:]]+$//'
          )"
          test "$CHROME_VERSION" = \
            "Google Chrome $M15_GOOGLE_CHROME_VERSION"
          test "$(stat -c '%s' "$CHROME_PATH")" = \
            "$M15_GOOGLE_CHROME_ELF_BYTES"
          printf '%s  %s\n' \
            "$M15_GOOGLE_CHROME_ELF_SHA256" \
            "$CHROME_PATH" \
            | sha256sum --check --strict -
          CHROME_SHA256="$M15_GOOGLE_CHROME_ELF_SHA256"
          echo "BROWSER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          echo "BROWSER_EXECUTABLE_SHA256=$CHROME_SHA256" >> "$GITHUB_ENV"
          printf 'Browser: %s\nPackage: %s\nELF: %s\nSHA-256: %s\n' \
            "$CHROME_VERSION" \
            "$M15_GOOGLE_CHROME_PACKAGE_VERSION" \
            "$CHROME_PATH" \
            "$CHROME_SHA256"

      - name: Preflight native X11 tab visibility
        env:
          BROWSER_ARTIFACT_DIR: diagnostics/visibility-preflight-${{ matrix.device_id }}
          BROWSER_HEADLESS: 'false'
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
        run: |
          test -x "$BROWSER_EXECUTABLE_PATH"
          xvfb-run -a bash scripts/run-headed-browser-smoke.sh \
            node tools/evidence/probe_m15_x11_visibility.mjs

      - name: Prepare immutable baseline build
        if: github.event_name == 'pull_request'
        run: |
          test "$(git rev-parse "$M15_BASELINE_SHA^{commit}")" = "$M15_BASELINE_SHA"
          git diff --quiet "$M15_BASELINE_SHA" -- package.json package-lock.json
          BASELINE_ROOT="$RUNNER_TEMP/m15-baseline-${{ matrix.device_id }}"
          mkdir -p "$BASELINE_ROOT"
          git archive --format=tar "$M15_BASELINE_SHA" \
            | tar -xf - -C "$BASELINE_ROOT"
          test ! -e "$BASELINE_ROOT/node_modules"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$BASELINE_ROOT/node_modules"
          VERCEL_GIT_COMMIT_SHA="$M15_BASELINE_SHA" \
            npm --prefix "$BASELINE_ROOT" run build
          echo "BASELINE_ROOT=$BASELINE_ROOT" >> "$GITHUB_ENV"

      - name: Capture exact baseline in candidate browser environment
        if: github.event_name == 'pull_request'
        env:
          BASE_URL: http://127.0.0.1:4174
          EXPECTED_COMMIT: ${{ env.M15_BASELINE_SHA }}
          BROWSER_ARTIFACT_DIR: diagnostics/baseline-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
        run: |
          test -d "$BASELINE_ROOT"
          mkdir -p "$BROWSER_ARTIFACT_DIR"
          nohup npm --prefix "$BASELINE_ROOT" run preview -- \
            --host 127.0.0.1 --port 4174 \
            > "$BROWSER_ARTIFACT_DIR/vite-preview.log" 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent "$BASE_URL/" > /dev/null; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              cat "$BROWSER_ARTIFACT_DIR/vite-preview.log"
              exit 1
            fi
            sleep 1
          done
          xvfb-run -a bash scripts/run-headed-browser-smoke.sh \
            node tools/evidence/capture_m15_baseline.mjs

      - name: Start local production build
        if: github.event_name == 'pull_request'
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/vite-preview.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/vite-preview.log
          exit 1

      - name: Test exact local pull request build
        if: github.event_name == 'pull_request'
        env:
          BASE_URL: http://127.0.0.1:4173
          EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/local-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
          PRODUCTION_WAIT_MS: '30000'
        run: xvfb-run -a bash scripts/run-headed-browser-smoke.sh

      - name: Test exact Vercel Preview
        if: github.event_name == 'pull_request'
        env:
          BASE_URL: ${{ env.M15_PREVIEW_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          EXPECTED_COMMIT: ${{ github.event.pull_request.head.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/preview-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
          PRODUCTION_WAIT_MS: '900000'
        run: xvfb-run -a bash scripts/run-headed-browser-smoke.sh

      - name: Test exact deployed Production
        if: github.event_name != 'pull_request'
        env:
          BASE_URL: https://boku-no-jihanki.vercel.app
          EXPECTED_COMMIT: ${{ github.sha }}
          BROWSER_ARTIFACT_DIR: diagnostics/production-${{ matrix.device_id }}
          BROWSER_VIEWPORT_WIDTH: ${{ matrix.width }}
          BROWSER_VIEWPORT_HEIGHT: ${{ matrix.height }}
          BROWSER_DEVICE_SCALE_FACTOR: ${{ matrix.dpr }}
          BROWSER_TOUCH: ${{ matrix.touch }}
          BROWSER_TRACE: ${{ matrix.trace }}
          PRODUCTION_WAIT_MS: '900000'
        run: xvfb-run -a bash scripts/run-headed-browser-smoke.sh

      - name: Upload screenshots, logs and trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ github.run_id }}-${{ matrix.device_id }}
          path: |
            diagnostics/visibility-preflight-${{ matrix.device_id }}
            diagnostics/baseline-${{ matrix.device_id }}
            diagnostics/local-${{ matrix.device_id }}
            diagnostics/preview-${{ matrix.device_id }}
            diagnostics/production-${{ matrix.device_id }}
          if-no-files-found: error
          retention-days: 90

  evidence:
    name: Assemble exact-head M1.5 Evidence
    if: github.event_name == 'pull_request'
    needs:
      - smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      M15_PREVIEW_URL: https://boku-no-jihanki-git-fix-m1-5-r-8c699e-rutantan88-7611s-projects.vercel.app
      M15_BASELINE_SHA: 29223ee31fd4fc4fbca21a37b01fe89277279647
      M15_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Evidence analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ffmpeg \
            python3-numpy \
            python3-pil \
            python3-scipy

      - name: Download same-run Browser Smoke artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: browser-smoke-${{ github.run_id }}-*
          path: ${{ runner.temp }}/m15-browser-smoke
          merge-multiple: true

      - name: Generate and assemble exact-head Evidence
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$M15_CANDIDATE_SHA"
          test -z "$(git status --short)"

          SMOKE_ROOT="$RUNNER_TEMP/m15-browser-smoke"
          AUDIO_ROOT="$RUNNER_TEMP/m15-audio-$M15_CANDIDATE_SHA"
          PLAYER_FOOT_EVIDENCE="$RUNNER_TEMP/player-foot-$M15_CANDIDATE_SHA.json"
          EVIDENCE_ROOT="$RUNNER_TEMP/m15-evidence-$M15_CANDIDATE_SHA"

          resolve_single_run() {
            local role_dir="$1"
            local run_pattern="$2"
            local -a candidates=()
            test -d "$role_dir"
            mapfile -t candidates < <(
              find "$role_dir" \
                -mindepth 1 -maxdepth 1 \
                -type d -name "$run_pattern" \
                -print
            )
            if [[ "${#candidates[@]}" -ne 1 ]]; then
              printf 'Expected one complete run under %s; found %s.\n' \
                "$role_dir" "${#candidates[@]}" >&2
              return 1
            fi
            printf '%s\n' "${candidates[0]}"
          }

          BASELINE_DESKTOP="$(
            resolve_single_run \
              "$SMOKE_ROOT/baseline-desktop-1280x720" 'baseline-*'
          )"
          BASELINE_TOUCH_844="$(
            resolve_single_run \
              "$SMOKE_ROOT/baseline-touch-844x390" 'baseline-*'
          )"
          BASELINE_TOUCH_932="$(
            resolve_single_run \
              "$SMOKE_ROOT/baseline-touch-932x430-dpr3" 'baseline-*'
          )"
          LOCAL_DESKTOP="$(
            resolve_single_run \
              "$SMOKE_ROOT/local-desktop-1280x720" 'm15-run-*'
          )"
          LOCAL_TOUCH_844="$(
            resolve_single_run \
              "$SMOKE_ROOT/local-touch-844x390" 'm15-run-*'
          )"
          LOCAL_TOUCH_932="$(
            resolve_single_run \
              "$SMOKE_ROOT/local-touch-932x430-dpr3" 'm15-run-*'
          )"
          PREVIEW_DESKTOP="$(
            resolve_single_run \
              "$SMOKE_ROOT/preview-desktop-1280x720" 'm15-run-*'
          )"
          PREVIEW_TOUCH_844="$(
            resolve_single_run \
              "$SMOKE_ROOT/preview-touch-844x390" 'm15-run-*'
          )"
          PREVIEW_TOUCH_932="$(
            resolve_single_run \
              "$SMOKE_ROOT/preview-touch-932x430-dpr3" 'm15-run-*'
          )"

          python3 tools/evidence/generate_m15_audio_evidence.py \
            --expected-commit "$M15_CANDIDATE_SHA" \
            --output-dir "$AUDIO_ROOT"
          python3 tools/art/validate_m15_assets.py \
            --expected-commit "$M15_CANDIDATE_SHA" \
            --json-out "$PLAYER_FOOT_EVIDENCE"
          python3 tools/evidence/assemble_m15_evidence.py \
            --baseline-runs \
              "$BASELINE_DESKTOP" \
              "$BASELINE_TOUCH_844" \
              "$BASELINE_TOUCH_932" \
            --candidate-local-runs \
              "$LOCAL_DESKTOP" \
              "$LOCAL_TOUCH_844" \
              "$LOCAL_TOUCH_932" \
            --preview-runs \
              "$PREVIEW_DESKTOP" \
              "$PREVIEW_TOUCH_844" \
              "$PREVIEW_TOUCH_932" \
            --audio-evidence-dir "$AUDIO_ROOT" \
            --player-foot-evidence-file "$PLAYER_FOOT_EVIDENCE" \
            --baseline-sha "$M15_BASELINE_SHA" \
            --candidate-sha "$M15_CANDIDATE_SHA" \
            --preview-url "$M15_PREVIEW_URL" \
            --output-dir "$EVIDENCE_ROOT"

          test -s "$EVIDENCE_ROOT/README.md"
          test -s "$EVIDENCE_ROOT/metrics.json"
          test -s "$EVIDENCE_ROOT/sha256-manifest.json"
          test -z "$(git status --short)"
          {
            printf '## M1.5 exact-head Evidence\n\n'
            printf -- '- Candidate SHA: `%s`\n' "$M15_CANDIDATE_SHA"
            printf -- '- Browser Smoke run: `%s`\n' "$GITHUB_RUN_ID"
            printf -- '- Bundle manifest SHA-256: `%s`\n' \
              "$(sha256sum "$EVIDENCE_ROOT/sha256-manifest.json" \
                | cut -d ' ' -f 1)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload exact-head Evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: m15-evidence-${{ github.run_id }}-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/m15-evidence-${{ github.event.pull_request.head.sha }}
