name: M1.2 Export Repository

on:
  push:
    branches:
      - feat/m1-2-painterly-raster
    paths:
      - '.github/workflows/m12-export-repository.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Create repository archive
        run: |
          mkdir -p export
          zip -rq export/BokuNoJihanki-main.zip . -x '.git/*' 'export/*'
      - uses: actions/upload-artifact@v4
        with:
          name: m12-repository-export
          path: export/BokuNoJihanki-main.zip
          retention-days: 2
