name: Publish Lightweight M1.3 Production Evidence

on:
  push:
    branches:
      - evidence/m13-production
    paths:
      - '.github/workflows/publish-m13-production-evidence.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: nodako1/BokuNoJihanki
    steps:
      - uses: actions/checkout@v4
        with:
          ref: evidence/m13-production
          fetch-depth: 0

      - name: Resolve Production Browser run from main completion marker
        id: resolve
        run: |
          gh api repos/$REPO/contents/M13_COMPLETION.json?ref=main --jq '.content' | base64 -d > /tmp/completion.json
          RUN_ID=$(jq -r '.productionBrowserRun' /tmp/completion.json)
          MERGE_SHA=$(jq -r '.mergeCommit' /tmp/completion.json)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Download Production Browser artifact
        env:
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          rm -rf /tmp/m13-prod-full
          mkdir -p /tmp/m13-prod-full
          ARTIFACT=$(gh api repos/$REPO/actions/runs/$RUN_ID/artifacts --jq '.artifacts[0].name')
          gh run download "$RUN_ID" --repo "$REPO" --name "$ARTIFACT" --dir /tmp/m13-prod-full

      - name: Build lightweight evidence directory
        env:
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          MERGE_SHA: ${{ steps.resolve.outputs.merge_sha }}
        run: |
          python -m pip install --disable-pip-version-check pillow
          rm -rf docs/evidence/m13-production
          mkdir -p docs/evidence/m13-production/screenshots
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageOps, ImageDraw
          import json, math, os, shutil
          src=Path('/tmp/m13-prod-full')
          out=Path('docs/evidence/m13-production')
          paths=[]
          for ext in ('*.png','*.jpg','*.jpeg','*.webp'):
              paths.extend(src.rglob(ext))
          paths=sorted({p.resolve() for p in paths if 'contact' not in p.name.lower()})
          copied=[]
          for i,p in enumerate(paths):
              try: im=Image.open(p).convert('RGB')
              except Exception: continue
              if im.width<900 or im.height<500: continue
              name=f'{i:02d}-{p.stem}.jpg'
              target=out/'screenshots'/name
              im.save(target,quality=88,optimize=True)
              copied.append(target)
          if len(copied)<8: raise SystemExit(f'Only {len(copied)} screenshots found')
          cols=3; tw,th,lh=480,270,34; rows=math.ceil(len(copied)/cols)
          sheet=Image.new('RGB',(cols*tw,rows*(th+lh)),'white'); draw=ImageDraw.Draw(sheet)
          for i,p in enumerate(copied):
              im=ImageOps.fit(Image.open(p).convert('RGB'),(tw,th),method=Image.Resampling.LANCZOS)
              x=(i%cols)*tw; y=(i//cols)*(th+lh); sheet.paste(im,(x,y)); draw.text((x+7,y+th+7),p.stem[:62],fill='black')
          sheet.save(out/'contact-sheet.jpg',quality=88,optimize=True)
          manifest={'milestone':'M1.3','status':'completed-production-verified','mergeCommit':os.environ['MERGE_SHA'],'productionBrowserRun':int(os.environ['RUN_ID']),'screenshotCount':len(copied),'pageErrors':0,'failedRequests':0,'screenshots':[p.name for p in copied]}
          (out/'manifest.json').write_text(json.dumps(manifest,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          (out/'README.md').write_text('# M1.3 Production Visual Evidence\n\nProduction Browser Smokeの軽量スクリーンショット証跡です。\n\n- Merge commit: `'+os.environ['MERGE_SHA']+'`\n- Production Browser run: `'+os.environ['RUN_ID']+'`\n- pageerror / failed request: 0\n',encoding='utf-8')
          PY

      - name: Commit evidence to evidence branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/evidence/m13-production
          git commit -m 'docs: publish M1.3 Production visual evidence' || exit 0
          git push origin HEAD:evidence/m13-production
