name: Merge M1 after verification

on:
  push:
    branches:
      - feat/m1-streaming-map
    paths:
      - .github/workflows/merge-m1-after-verification.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: merge-m1-after-verification
  cancel-in-progress: false

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout M1 branch
        uses: actions/checkout@v4
        with:
          ref: feat/m1-streaming-map
          fetch-depth: 0

      - name: Verify final M1 source state
        shell: bash
        run: |
          test ! -d bootstrap
          test ! -f .github/workflows/bootstrap-m1.yml
          test ! -f .github/workflows/source-snapshot.yml
          test -f docs/specs/M1_STREAMING_MAP.md
          grep -q '"currentMilestone": "M1"' PROJECT_STATE.json
          git fetch origin main
          git diff --name-only origin/main...HEAD | grep -q '^src/'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run complete quality check
        run: npm run check

      - name: Remove temporary merge workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/merge-m1-after-verification.yml
          git commit -m "chore: remove temporary M1 merge workflow [skip ci]"
          git push origin HEAD:feat/m1-streaming-map

      - name: Mark PR ready and merge through REST API
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api graphql -f query='mutation($id:ID!){markPullRequestReadyForReview(input:{pullRequestId:$id}){pullRequest{number}}}' -f id="$(gh api repos/nodako1/BokuNoJihanki/pulls/4 --jq .node_id)" || true
          HEAD_SHA=$(gh api repos/nodako1/BokuNoJihanki/pulls/4 --jq .head.sha)
          gh api --method PUT repos/nodako1/BokuNoJihanki/pulls/4/merge \
            -f merge_method=squash \
            -f sha="$HEAD_SHA" \
            -f commit_title='feat: M1 ロード無しストリーミングマップを実装'
